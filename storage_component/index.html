<!DOCTYPE html>
<html>
<head>
    <!-- Basic Streamlit component library -->
    <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.4.0/dist/streamlit-component-lib.js"></script>
    <script>
        function onRender(event) {
            const {storage_key, action, value} = event.detail.args;
            
            if (action === "get") {
                const storedValue = localStorage.getItem(storage_key);
                Streamlit.setComponentValue(storedValue);
            } else if (action === "set") {
                localStorage.setItem(storage_key, value);
                Streamlit.setComponentValue(value);
            }
        }

        // Connect to Streamlit
        Streamlit.events.addEventListener(Streamlit.EVENTS.RENDER, onRender);
        Streamlit.setComponentReady();
    </script>
</head>
<body>
</body>
</html>
